version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ironcore-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ironcore-gym

  redis:
    image: redis:7-alpine
    container_name: ironcore-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ironcore-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/ironcore-gym
      REDIS_URL: redis://redis:6379
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ironcore-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  mongodb_data:
  redis_data:
